<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PRD Board — msg</title>
<!--
  msg --gui  ·  PRD board.
  Generated by .claude/skills/msg/refs/protocol-gui.md via template + data-fill.
  Placeholders replaced at generation/serve time (each appears exactly once):
    the STYLES token inside <style>           ← contents of refs/gui/styles.css
    the PRD-DATA token inside the JSON script ← a JSON object (see protocol-gui.md)
    the API-TOKEN token                       ← write token (server mode only)
  Two modes, one file:
    static  — opened as a plain file / dumb http server: read-only board,
              all data inline, no fetch succeeds → editing UI stays hidden.
    live    — served by refs/gui/server.py: /api/* endpoints light up editing,
              todo toggling, drag-and-drop, the prompt console and file viewer.
-->
<style>__STYLES__</style>
</head>
<body>

<div id="root" class="app"></div>

<div id="scrim" class="scrim"></div>
<aside id="panel" class="panel" aria-hidden="true">
  <div class="panel-head">
    <h3 id="panel-title">Todo</h3>
    <button class="panel-close" id="panel-close" aria-label="Close">×</button>
  </div>
  <div class="panel-body" id="panel-body"></div>
  <div class="panel-actions" id="panel-actions"></div>
</aside>

<div id="modal-scrim" class="modal-scrim"></div>
<div id="modal" class="modal" aria-hidden="true"></div>

<div id="toast" role="status"></div>

<script id="prd-data" type="application/json">__PRD_DATA__</script>
<script>
"use strict";

/* ---- Load inline data ----------------------------------------------------- */
var DATA = { prds: [], gateIssues: [], reports: [], skipped: [], projectFiles: [] };
try { DATA = JSON.parse(document.getElementById("prd-data").textContent) || DATA; }
catch (e) { DATA = { prds: [], gateIssues: [], reports: [], skipped: [], projectFiles: [], _parseError: String(e) }; }
var PRDS = Array.isArray(DATA.prds) ? DATA.prds : [];
var GATE_ISSUES = Array.isArray(DATA.gateIssues) ? DATA.gateIssues : [];
var REPORTS = Array.isArray(DATA.reports) ? DATA.reports : [];
var ROADMAP = DATA.roadmap || { exists: false, phases: [], tuneLog: "" };

/* ---- Live-mode plumbing ---------------------------------------------------- */
var TOKEN = "__API_TOKEN__";
if (TOKEN.indexOf("__") === 0) TOKEN = "";           // static fill leaves the placeholder
var DEFAULT_VIEW = "__DEFAULT_VIEW__";
if (DEFAULT_VIEW.indexOf("__") === 0) DEFAULT_VIEW = "board";   // static fill leaves the placeholder
var LIVE = false;                                     // flipped by ping() at boot

function api(path, body) {
  var opts = body
    ? { method: "POST", headers: { "Content-Type": "application/json", "X-Msg-Token": TOKEN }, body: JSON.stringify(body) }
    : { headers: { "X-Msg-Token": TOKEN } };
  return fetch("api/" + path, opts).then(function (r) {
    return r.json().then(function (j) {
      if (!r.ok || (j && j.error)) throw new Error((j && j.error) || ("HTTP " + r.status));
      return j;
    });
  });
}

function adoptData(d) {
  DATA = d || DATA;
  PRDS = Array.isArray(DATA.prds) ? DATA.prds : [];
  GATE_ISSUES = Array.isArray(DATA.gateIssues) ? DATA.gateIssues : [];
  REPORTS = Array.isArray(DATA.reports) ? DATA.reports : [];
  ROADMAP = DATA.roadmap || { exists: false, phases: [], tuneLog: "" };
}
function refreshData(rerender) {
  if (!LIVE) { if (rerender) route(); return Promise.resolve(); }
  return api("data").then(function (d) { adoptData(d); if (rerender) route(); })
    .catch(function (e) { toast("Refresh failed: " + e.message, true); });
}

/* ---- Toast ----------------------------------------------------------------- */
var toastTimer = null;
function toast(msg, isError) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.className = isError ? "error show" : "show";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function () { t.className = ""; }, 2600);
}

/* ---- Theme ------------------------------------------------------------------ */
function initTheme() {
  var saved = null;
  try { saved = localStorage.getItem("msg-theme"); } catch (e) {}
  if (saved === "light" || saved === "dark") document.documentElement.setAttribute("data-theme", saved);
}
function toggleTheme() {
  var el = document.documentElement;
  var cur = el.getAttribute("data-theme");
  if (!cur) cur = (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light";
  var next = cur === "dark" ? "light" : "dark";
  el.setAttribute("data-theme", next);
  try { localStorage.setItem("msg-theme", next); } catch (e) {}
}
initTheme();

/* ---- Test-issue helpers ------------------------------------------------------ */
function findIssueFile(runId) {
  return GATE_ISSUES.filter(function (t) { return String(t.runId) === String(runId); })[0];
}
// Per-ticket done-state is honest, not invented: derived only from the file's
// followUp.status (resolved → done; open/partially_resolved → open).
function issueFollowStatus(tf) { return (tf && tf.followUp && tf.followUp.status) || "open"; }
function ticketDone(tf) { return issueFollowStatus(tf) === "resolved"; }
function crossLinkedIssues(p) {
  var out = [];
  GATE_ISSUES.forEach(function (tf) {
    var prd = tf.context && tf.context.prd;
    if (!prd) return;
    if (String(prd).indexOf(p.id) >= 0 || (p.path && String(prd).indexOf(p.path) >= 0)) {
      (tf.tickets || []).forEach(function (t) {
        out.push(Object.assign({ _fid: null, _feature: "gate " + tf.runId, _issueFile: tf, done: ticketDone(tf) }, t));
      });
    }
  });
  return out;
}

/* ---- Completion buckets ------------------------------------------------------- */
// v2 completion ladder (H1): product → planned → building → gated → staged → shipped.
var BUCKETS = [
  { key: "product",  label: "Product" },
  { key: "planned",  label: "Planned" },
  { key: "building", label: "Building" },
  { key: "gated",    label: "Gated" },
  { key: "staged",   label: "Staged" },
  { key: "shipped",  label: "Shipped" }
];
var BUCKET_ORDER = BUCKETS.reduce(function (m, b, i) { m[b.key] = i; return m; }, {});
function bucketOf(p) { return BUCKET_ORDER[p.completion] != null ? p.completion : "planned"; }
function bucketLabel(k) { var b = BUCKETS.filter(function (x) { return x.key === k; })[0]; return b ? b.label : k; }

/* ---- Helpers -------------------------------------------------------------------- */
function esc(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}
function el(html) { var t = document.createElement("template"); t.innerHTML = html.trim(); return t.content.firstChild; }
function findPrd(id) { return PRDS.filter(function (p) { return String(p.id) === String(id); })[0]; }
function todoCounts(p) {
  var all = (p.features || []).reduce(function (a, f) { return a.concat(f.todos || []); }, []);
  var done = all.filter(function (t) { return t && t.done === true; }).length;
  return { done: done, total: all.length };
}
function allTodos(p) {
  return (p.features || []).reduce(function (a, f) {
    return a.concat((f.todos || []).map(function (t) { return Object.assign({ _fid: f.id, _feature: f.title }, t); }));
  }, []);
}
// G6 — make a table row a first-class keyboard target, mirroring card behaviour.
function rowify(row, go) {
  row.className = (row.className ? row.className + " " : "") + "rowlink";
  row.setAttribute("tabindex", "0");
  row.setAttribute("role", "button");
  row.addEventListener("click", go);
  row.addEventListener("keydown", function (e) {
    if (e.key === "Enter" || e.key === " ") { e.preventDefault(); go(e); }
  });
  return row;
}

/* ---- Markdown → HTML (G10a) -----------------------------------------------------
   Self-contained, offline, injection-safe: the source is HTML-escaped BEFORE any
   markup transformation, so PRD content can never smuggle live HTML. Covers the
   constructs PRDs actually use: headings, hr, fenced code, blockquotes, tables,
   nested bullet/numbered lists (+ [ ] checkboxes), bold/italic/inline code/links. */
function mdInline(s) {
  var codes = [];
  s = s.replace(/`([^`]+)`/g, function (_, c) { codes.push(c); return "\u0001" + (codes.length - 1) + "\u0001"; });
  s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
  s = s.replace(/(^|[^*\w])\*([^*\s][^*]*)\*/g, "$1<em>$2</em>");
  s = s.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, function (m, txt, href) {
    if (!/^(https?:|#|\.{0,2}\/|[\w.-]+\.md)/i.test(href)) return txt; // escaped already; allow web/anchor/relative
    return '<a href="' + href + '" target="_blank" rel="noopener">' + txt + "</a>";
  });
  s = s.replace(/\u0001(\d+)\u0001/g, function (_, i) { return "<code>" + codes[+i] + "</code>"; });
  return s;
}
function mdToHtml(src) {
  var lines = esc(String(src == null ? "" : src)).replace(/\r\n?/g, "\n").split("\n");
  var out = [], i = 0, para = [];
  function flushPara() {
    if (para.length) { out.push("<p>" + para.map(mdInline).join("<br>") + "</p>"); para = []; }
  }
  function isTableSep(l) { return /^\s*\|?[\s:|-]+\|[\s:|-]*\s*$/.test(l) && l.indexOf("-") >= 0; }
  function splitRow(l) {
    var t = l.replace(/^\s*\|/, "").replace(/\|\s*$/, "");
    return t.split("|").map(function (c) { return c.trim(); });
  }
  while (i < lines.length) {
    var line = lines[i];

    if (/^```/.test(line)) {                                     // fenced code
      flushPara();
      var code = []; i++;
      while (i < lines.length && !/^```/.test(lines[i])) { code.push(lines[i]); i++; }
      i++; out.push("<pre><code>" + code.join("\n") + "</code></pre>");
      continue;
    }
    var h = line.match(/^(#{1,6})\s+(.*)$/);                      // heading
    if (h) {
      flushPara();
      var lvl = Math.min(h[1].length, 4);
      out.push("<h" + lvl + ">" + mdInline(h[2].replace(/\s#+\s*$/, "")) + "</h" + lvl + ">");
      i++; continue;
    }
    if (/^(\s*)(-{3,}|\*{3,}|_{3,})\s*$/.test(line)) { flushPara(); out.push("<hr>"); i++; continue; }
    if (/^&gt;\s?/.test(line)) {                                  // blockquote
      flushPara();
      var q = [];
      while (i < lines.length && /^&gt;\s?/.test(lines[i])) { q.push(lines[i].replace(/^&gt;\s?/, "")); i++; }
      out.push("<blockquote>" + mdToHtml(q.join("\n")) + "</blockquote>");
      continue;
    }
    if (line.indexOf("|") >= 0 && i + 1 < lines.length && isTableSep(lines[i + 1])) {   // table
      flushPara();
      var head = splitRow(line); i += 2;
      var rows = [];
      while (i < lines.length && lines[i].indexOf("|") >= 0 && lines[i].trim() !== "") { rows.push(splitRow(lines[i])); i++; }
      var t = '<div class="md-table-wrap"><table><thead><tr>' +
        head.map(function (c) { return "<th>" + mdInline(c) + "</th>"; }).join("") + "</tr></thead><tbody>";
      rows.forEach(function (r) {
        t += "<tr>" + head.map(function (_, ci) { return "<td>" + mdInline(r[ci] == null ? "" : r[ci]) + "</td>"; }).join("") + "</tr>";
      });
      out.push(t + "</tbody></table></div>");
      continue;
    }
    var li = line.match(/^(\s*)([-*+]|\d+\.)\s+(.*)$/);           // list block (2 levels)
    if (li) {
      flushPara();
      var items = [];
      while (i < lines.length) {
        var m2 = lines[i].match(/^(\s*)([-*+]|\d+\.)\s+(.*)$/);
        if (m2) { items.push({ ind: m2[1].length, ord: /\d/.test(m2[2]), text: m2[3] }); i++; }
        else if (/^\s{2,}\S/.test(lines[i]) && items.length) {    // continuation line
          items[items.length - 1].text += "<br>" + lines[i].trim(); i++;
        } else break;
      }
      var base = items[0].ind;
      function renderItem(text) {
        var cb = text.match(/^\[([ xX])\]\s+(.*)$/);
        if (cb) return '<input type="checkbox" disabled' + (cb[1] === " " ? "" : " checked") + ">" + mdInline(cb[2]);
        return mdInline(text);
      }
      var html = "", stack = [];
      function openList(ord) { html += ord ? "<ol>" : "<ul>"; stack.push(ord ? "</ol>" : "</ul>"); }
      function closeList() { html += "</li>" + stack.pop(); }
      openList(items[0].ord);
      var depth = 0, first = true;
      items.forEach(function (it) {
        var d = it.ind > base + 1 ? 1 : 0;
        if (d > depth) { openList(it.ord); html += "<li>" + renderItem(it.text); depth = d; first = false; return; }
        while (d < depth) { closeList(); depth--; }
        if (!first) html += "</li>";
        html += "<li>" + renderItem(it.text);
        first = false;
      });
      html += "</li>";
      while (stack.length) html += stack.pop();
      out.push(html);
      continue;
    }
    if (line.trim() === "") { flushPara(); i++; continue; }
    para.push(line); i++;
  }
  flushPara();
  return out.join("\n");
}

/* ---- Reusable fragments ------------------------------------------------------------ */
function statusPill(p) {
  var k = bucketOf(p);
  return '<span class="pill dot st-' + k + '">' + esc(bucketLabel(k)) + "</span>";
}
// Live mode: the status pill becomes an editable select that persists a
// frontmatter `completion:` override (see protocol-gui.md).
function statusControl(p) {
  if (!LIVE) return el(statusPill(p));
  var k = bucketOf(p);
  var s = el('<select class="mini-select" aria-label="Status">' + BUCKETS.map(function (b) {
    return '<option value="' + b.key + '"' + (b.key === k ? " selected" : "") + ">" + esc(b.label) + "</option>";
  }).join("") + "</select>");
  s.addEventListener("click", function (e) { e.stopPropagation(); });
  s.addEventListener("change", function () {
    requestStatusChange(p, s.value, function () { s.value = bucketOf(p); });   // Edit 8 — cancel reverts the select
  });
  return s;
}
function changeStatus(p, bucket) {
  api("prd/meta", { path: p.path, key: "completion", value: bucket })
    .then(function () { toast("PRD-" + p.num + " → " + bucketLabel(bucket)); return refreshData(true); })
    .catch(function (e) { toast("Save failed: " + e.message, true); });
}

/* ---- Confirmation modal (Edit 8) ------------------------------------------------
   A reusable dialog. modalCancel is set while open so Esc / scrim-click cancel the
   modal (taking precedence over the side panel) and any status <select> reverts. */
var modalCancel = null;
function closeModal() {
  var m = document.getElementById("modal");
  m.classList.remove("open");
  m.setAttribute("aria-hidden", "true");
  m.innerHTML = "";
  document.getElementById("modal-scrim").classList.remove("open");
  modalCancel = null;
}
function confirmModal(opts) {
  opts = opts || {};
  var m = document.getElementById("modal");
  m.innerHTML = "";
  var card = el('<div class="modal-card" role="dialog" aria-modal="true"></div>');
  card.appendChild(el('<div class="modal-head">' + esc(opts.title || "Confirm") + "</div>"));
  var body = el('<div class="modal-body"></div>');
  if (opts.message) body.appendChild(el("<p>" + esc(opts.message) + "</p>"));
  if (opts.bodyHtml) body.appendChild(el("<div>" + opts.bodyHtml + "</div>"));
  card.appendChild(body);
  var actions = el('<div class="modal-actions"></div>');
  var cancel = el('<button class="btn ghost">' + esc(opts.cancelLabel || "Cancel") + "</button>");
  var confirm = el('<button class="btn primary">' + esc(opts.confirmLabel || "Confirm") + "</button>");
  function done(fn) { closeModal(); if (fn) fn(); }
  cancel.addEventListener("click", function () { done(opts.onCancel); });
  confirm.addEventListener("click", function () { done(opts.onConfirm); });
  actions.appendChild(cancel); actions.appendChild(confirm);
  card.appendChild(actions);
  m.appendChild(card);
  m.classList.add("open");
  m.setAttribute("aria-hidden", "false");
  document.getElementById("modal-scrim").classList.add("open");
  modalCancel = function () { done(opts.onCancel); };
  confirm.focus();
}

// Edit 8 — every PRD status change is double-confirmed (detail dropdown + board drag).
// onCancel reverts whatever triggered it (e.g. a <select> back to the current bucket).
function requestStatusChange(p, bucket, onCancel) {
  if (!p || bucket === bucketOf(p)) { if (onCancel) onCancel(); return; }
  var c = todoCounts(p);
  var open = allTodos(p).filter(function (t) { return t.done !== true; });
  var todosHtml = "";
  if (open.length) {
    todosHtml = '<div class="modal-todos"><div class="modal-todos-head">' + open.length +
      " open todo" + (open.length === 1 ? "" : "s") + " remaining:</div><ul>" +
      open.slice(0, 8).map(function (t) {
        return "<li>" + esc((t.id ? t.id + " · " : "") + (t.title || t.objective || "todo")) + "</li>";
      }).join("") +
      (open.length > 8 ? '<li class="dim">…and ' + (open.length - 8) + " more</li>" : "") +
      "</ul></div>";
  }
  var from = bucketOf(p);
  var body = '<div class="modal-transition">' +
    '<span class="pill dot st-' + from + '">' + esc(bucketLabel(from)) + "</span>" +
    '<span class="modal-arrow">→</span>' +
    '<span class="pill dot st-' + bucket + '">' + esc(bucketLabel(bucket)) + "</span></div>" +
    '<p class="modal-count">' + c.done + " of " + c.total + " todo" + (c.total === 1 ? "" : "s") +
    " complete for this PRD.</p>" + todosHtml;
  confirmModal({
    title: "Move PRD-" + p.num + "?",
    message: "Confirm the tasks for this stage are complete — this moves the PRD to the next status.",
    bodyHtml: body,
    confirmLabel: "Move to " + bucketLabel(bucket),
    onConfirm: function () { changeStatus(p, bucket); },
    onCancel: onCancel
  });
}
function badgePills(p) {
  var b = p.badges || {};
  function one(label, v) {
    if (v == null) return '<span class="pill unset">' + esc(label) + " —</span>";
    return '<span class="pill ' + (v ? "set" : "unset") + '">' + esc(label) + (v ? " ✓" : " ✕") + "</span>";
  }
  return one("product-tuned", b.productTuned) + one("eng-tuned", b.engTuned) + one("reviewed", b.reviewed);
}
function progressFrag(p) {
  if (!p.hasTodos) return "";
  var c = todoCounts(p);
  if (c.total === 0) return "";
  var pct = c.total ? Math.round((c.done / c.total) * 100) : 0;
  return '<span class="progress"><span class="bar"><i style="width:' + pct + '%"></i></span>' +
         c.done + "/" + c.total + "</span>";
}

/* ---- View state ----------------------------------------------------------------------- */
var state = {
  listView: "kanban",
  todoView: "kanban",
  filter: "",
  sortKey: "completion",
  sortDir: 1,
  openSections: {},       // G3 — per-section accordion open-state survives re-renders
  editing: false,
  draft: ""               // prompt-console prefill
};

var root = document.getElementById("root");

/* ---- Topbar / nav ----------------------------------------------------------------------- */
function topbar(active, opts) {
  opts = opts || {};
  var bar = el('<div class="topbar"></div>');
  bar.appendChild(el("<h1>" + esc(opts.title || "PRD Board") + "</h1>"));
  if (opts.count != null) bar.appendChild(el('<span class="count">' + opts.count + "</span>"));
  bar.appendChild(el('<span class="spacer"></span>'));

  var showFiles = LIVE || (DATA.projectFiles && DATA.projectFiles.length);
  var nav = el('<nav class="nav"></nav>');
  nav.appendChild(el('<a href="#/"' + (active === "board" ? ' class="active"' : "") + ">Board</a>"));
  if (ROADMAP && (ROADMAP.exists || LIVE))
    nav.appendChild(el('<a href="#/roadmap"' + (active === "roadmap" ? ' class="active"' : "") + ">Roadmap</a>"));
  if (REPORTS.length || LIVE)
    nav.appendChild(el('<a href="#/reports"' + (active === "reports" ? ' class="active"' : "") + ">Reports</a>"));
  if (showFiles) nav.appendChild(el('<a href="#/files"' + (active === "files" ? ' class="active"' : "") + ">Files</a>"));
  if (LIVE) nav.appendChild(el('<a href="#/prompts"' + (active === "prompts" ? ' class="active"' : "") + ">Prompts</a>"));
  bar.appendChild(nav);

  bar.appendChild(el('<span class="mode-tag' + (LIVE ? " live" : "") + '">' + (LIVE ? "Live" : "Read-only") + "</span>"));

  if (LIVE) {
    var newBtn = el('<button class="btn primary">＋ New PRD</button>');
    newBtn.addEventListener("click", function () {
      state.draft = "/plan-pm ";
      location.hash = "#/prompts";
    });
    bar.appendChild(newBtn);
  }
  var theme = el('<button class="icon-btn" title="Toggle light/dark" aria-label="Toggle theme">◐</button>');
  theme.addEventListener("click", toggleTheme);
  bar.appendChild(theme);
  return bar;
}

/* ========================================================================= */
/*  LIST PAGE                                                                 */
/* ========================================================================= */
function renderList() {
  root.innerHTML = "";
  root.appendChild(topbar("board", {
    title: DATA.project || "PRD Board",
    count: PRDS.length + " PRD" + (PRDS.length === 1 ? "" : "s") +
      (DATA.skipped && DATA.skipped.length ? " · " + DATA.skipped.length + " skipped" : "")
  }));

  if (DATA.skipped && DATA.skipped.length) {
    root.appendChild(el('<div class="notice">' + DATA.skipped.length +
      " PRD file(s) skipped (unparseable): " +
      esc(DATA.skipped.map(function (s) { return s.path; }).join(", ")) + "</div>"));
  }

  if (PRDS.length === 0) {
    root.appendChild(el('<div class="empty-state"><div class="big">No PRDs yet</div>' +
      'Nothing under <code>features/prd-*/</code>. Run <code>/plan-pm</code> to create one.</div>'));
    renderTestIssuesSection(root);
    return;
  }

  var toolbar = el('<div class="toolbar"></div>');
  toolbar.appendChild(seg("listView", renderList, [["kanban", "Kanban"], ["table", "Table"]]));
  var f = el('<input class="filter-input" type="text" placeholder="Filter PRDs…">');
  f.value = state.filter;
  f.addEventListener("input", function () { state.filter = f.value; renderListBody(body); });
  toolbar.appendChild(f);
  root.appendChild(toolbar);

  var body = el('<div id="list-body"></div>');
  root.appendChild(body);
  renderListBody(body);

  renderTestIssuesSection(root);
}

/* ---- Gate Issues surface ---------------------------------------------------- */
function issueVerdictPill(v) {
  var cls = v === "fail" ? "iv-fail" : "iv-warn";
  return '<span class="pill dot ' + cls + '">' + esc(v || "?") + "</span>";
}
function followPill(s) {
  var map = { resolved: "st-shipped", partially_resolved: "st-review", open: "muted" };
  var label = s === "partially_resolved" ? "Partially resolved" : (s === "resolved" ? "Resolved" : "Open");
  return '<span class="pill ' + (map[s] || "muted") + '">' + esc(label) + "</span>";
}
function issueProgressFrag(tf) {
  var tickets = tf.tickets || [];
  if (!tickets.length) return "";
  var done = ticketDone(tf) ? tickets.length : 0;
  var pct = Math.round((done / tickets.length) * 100);
  return '<span class="progress"><span class="bar"><i style="width:' + pct + '%"></i></span>' +
         done + "/" + tickets.length + "</span>";
}
function issueFileCard(tf) {
  var s = tf.summary || {};
  var counts = [];
  if (s.failed)   counts.push(s.failed + " failed");
  if (s.flaky)    counts.push(s.flaky + " flaky");
  if (s.warnings) counts.push(s.warnings + " warning" + (s.warnings === 1 ? "" : "s"));
  var c = el(
    '<div class="card issue-file-card" tabindex="0" role="button">' +

function makeDropTarget(col, onDropId, type) {
  col.addEventListener("dragover", function (e) {
    if (e.dataTransfer.types.indexOf(type) >= 0) { e.preventDefault(); col.classList.add("drag-over"); }
  });
  col.addEventListener("dragleave", function () { col.classList.remove("drag-over"); });
  col.addEventListener("drop", function (e) {
    e.preventDefault(); col.classList.remove("drag-over");
    var id = e.dataTransfer.getData(type);
    if (id) onDropId(id);
  });
}

    if (typeof va === "string") { va = va.toLowerCase(); vb = String(vb).toLowerCase(); }

  var wrap = el('<div class="table-wrap"></div>');

      "<td>" + (p.platform ? '<span class="pill plat">' + esc(p.platform) + "</span>" : "") + "</td>" +
      "<td>" + statusPill(p) + "</td>" +

/* ---- PRD-body section splitting (G-detail) --------------------------------------
   The raw PRD markdown is cut on every `## ` (H2) heading so each section renders
   as its own accordion. The pre-first-heading preamble becomes "Overview" (its
   leading `# PRD-N` title is dropped — it already sits in the detail head). The
   `## Todos` dump and `## Audit` blocks are omitted (todos + findings render in
   their own dedicated surfaces); any nested `### 12. Findings` block is stripped
   from the section it lives under. */
function slugify(s) {
  return String(s == null ? "" : s).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "").slice(0, 60);
}
function stripEngFindings(body) {
  var lines = String(body).split("\n"), out = [], skip = false;
  for (var i = 0; i < lines.length; i++) {
    if (/^###\s+12\.\s+Findings\b/i.test(lines[i])) { skip = true; continue; }
    if (skip && /^###\s+/.test(lines[i])) skip = false;
    if (!skip) out.push(lines[i]);
  }
  return out.join("\n").trim();
}
function splitSections(detail) {
  var lines = String(detail == null ? "" : detail).replace(/\r\n?/g, "\n").split("\n");
  var secs = [], cur = null;
  function push() { if (cur) { cur.body = cur.lines.join("\n").trim(); delete cur.lines; secs.push(cur); } }
  lines.forEach(function (line) {
    var h = line.match(/^##\s+(.*)$/);
    if (h) { push(); cur = { heading: h[1].replace(/\s#+\s*$/, "").trim(), lines: [] }; }
    else {
      if (!cur) cur = { heading: "Overview", lines: [], preamble: true };
      cur.lines.push(line);
    }
  });
  push();
  return secs
    .filter(function (s) { return !/^(?:\d+\.\s*)?(Todos|Audit|Plan tune findings)\b/i.test(s.heading); })
    .map(function (s, idx) {
      var body = s.preamble ? s.body.replace(/^#\s+.*(\n|$)/, "").trim() : s.body;   // drop the duplicate H1
      body = stripEngFindings(body);
      return { heading: s.heading, slug: slugify(s.heading) || ("sec-" + idx), body: body, defaultOpen: idx === 0 };
    })
    .filter(function (s) { return s.body; });
}

/* ---- Plan-tune findings parsing (Edit 4) ----------------------------------------
   Two producers feed one table. The product findings section — new
   `## N. Plan tune findings` (legacy `## Audit — <date>` still supported) — is now a
   markdown table (columns: #, Date, Auditor, Severity, What is wrong, Suggested fix,
   Why it matters, Status). Legacy PRDs used prose blocks (Finding N — Severity — Title,
   then What is wrong / Why it matters / Suggested fix) — still parsed as a fallback.
   The eng `### 12. Findings — PRD gaps` list (`N. **Severity** — text`) also feeds the
   table (see parseEngFindings). */
function splitTableRow(row) {
  return String(row).replace(/^\s*\|/, "").replace(/\|\s*$/, "").split("|")
    .map(function (c) { return c.trim(); });
}
function parseFindingsTable(seg) {
  var headerIdx = -1;
  for (var i = 0; i < seg.length; i++) {
    if (/\|/.test(seg[i]) && /severity/i.test(seg[i]) && /what is wrong/i.test(seg[i])) { headerIdx = i; break; }
  }
  if (headerIdx < 0) return null;
  var sepIdx = headerIdx + 1;
  while (sepIdx < seg.length && !seg[sepIdx].trim()) sepIdx++;
  if (sepIdx >= seg.length || !/^\s*\|?[\s:|]*-[-\s:|]*\|?\s*$/.test(seg[sepIdx])) return null;
  var cols = splitTableRow(seg[headerIdx]).map(function (c) { return c.toLowerCase(); });
  function colIdx(pred) { for (var k = 0; k < cols.length; k++) if (pred(cols[k])) return k; return -1; }
  var numIdx = colIdx(function (c) { return c === "#" || c === "num"; });
  var dateIdx = colIdx(function (c) { return c.indexOf("date") >= 0; });
  var audIdx = colIdx(function (c) { return c.indexOf("auditor") >= 0; });
  var sevIdx = colIdx(function (c) { return c.indexOf("severity") >= 0; });
  var wrongIdx = colIdx(function (c) { return c.indexOf("what is wrong") >= 0; });
  var fixIdx = colIdx(function (c) { return c.indexOf("suggested fix") >= 0 || c.indexOf("fix") >= 0; });
  var mattersIdx = colIdx(function (c) { return c.indexOf("why it matters") >= 0 || c.indexOf("matters") >= 0; });
  var statusIdx = colIdx(function (c) { return c.indexOf("status") >= 0; });
  var out = [];
  for (var r = sepIdx + 1; r < seg.length; r++) {
    if (!/\|/.test(seg[r])) continue;                 // table ended
    var cells = splitTableRow(seg[r]);
    function cell(idx) { return idx >= 0 && idx < cells.length ? cells[idx] : ""; }
    var sev = cell(sevIdx);
    if (!sev || sev === "—" || sev === "-") continue; // skip Clean / empty rows
    out.push({ source: "Plan tune", n: cell(numIdx), date: cell(dateIdx), auditor: cell(audIdx),
      severity: sev, title: "", wrong: cell(wrongIdx), fix: cell(fixIdx),
      matters: cell(mattersIdx), status: cell(statusIdx) });
  }
  return out;
}
function parseFindingsProse(seg) {
  var out = [], starts = [];
  seg.forEach(function (l, i) {
    var fm = l.match(/^Finding\s+(\d+)\s*[—–-]\s*(\w+)\s*[—–-]\s*(.+)$/);
    if (fm) starts.push({ n: +fm[1], severity: fm[2], title: fm[3].trim(), i: i });
  });
  starts.forEach(function (f, k) {
    var end = k + 1 < starts.length ? starts[k + 1].i : seg.length;
    var fields = { wrong: "", matters: "", fix: "" }, key = null;
    seg.slice(f.i + 1, end).forEach(function (l) {
      if (/^What is wrong:/i.test(l)) { key = "wrong"; return; }
      if (/^Why it matters/i.test(l)) { key = "matters"; return; }
      if (/^Suggested fix:/i.test(l)) { key = "fix"; return; }
      if (key && l.trim()) fields[key] += (fields[key] ? " " : "") + l.trim();
    });
    out.push({ source: "Product Audit", n: f.n, severity: f.severity, title: f.title,
      wrong: fields.wrong.trim(), matters: fields.matters.trim(), fix: fields.fix.trim(),
      date: "", auditor: "", status: "" });
  });
  return out;
}
function parseAuditFindings(detail) {
  var text = String(detail == null ? "" : detail).replace(/\r\n?/g, "\n");
  var lines = text.split("\n");
  var out = [];
  for (var a = 0; a < lines.length; a++) {
    if (!/^##\s+(?:\d+\.\s*)?(Plan tune findings|Audit)\b/i.test(lines[a])) continue;
    var b = a + 1;
    while (b < lines.length && !/^##\s+/.test(lines[b])) b++;   // to next H2
    var seg = lines.slice(a + 1, b);
    out = out.concat(parseFindingsTable(seg) || parseFindingsProse(seg));
    a = b - 1;
  }
  return out;
}
function parseEngFindings(detail) {
  var lines = String(detail == null ? "" : detail).replace(/\r\n?/g, "\n").split("\n");
  var out = [], inSec = false, n = 0;
  for (var i = 0; i < lines.length; i++) {
    if (/^###\s+12\.\s+Findings\b/i.test(lines[i])) { inSec = true; continue; }
    if (inSec && /^###\s+/.test(lines[i])) break;
    if (!inSec) continue;
    var lm = lines[i].match(/^\s*\d+\.\s+\*\*([\w-]+)\*\*\s*[—–-]\s*(.+)$/);
    if (lm) out.push({ source: "Eng §12", n: ++n, severity: lm[1], title: lm[2].trim(), wrong: "", matters: "", fix: "" });
    else if (out.length && lines[i].trim() && !/^\s*\d+\.\s/.test(lines[i]) && !/^\s*-\s/.test(lines[i]))
      out[out.length - 1].title += " " + lines[i].trim();   // wrapped continuation
  }
  return out;
}
function findingSevPill(sev) {
  var k = slugify(sev);
  return '<span class="pill sev-' + esc(k) + '">' + esc(sev || "?") + "</span>";
}
function findingsAccordion(p) {
  var rows = parseAuditFindings(p.detail).concat(parseEngFindings(p.detail));
  if (!rows.length) return null;
  var open = state.openSections.__findings === true;
  var det = el('<details class="collapsible section findings-section"' + (open ? " open" : "") + ">" +
    '<summary><span class="chev">▸</span> Plan-tune findings <span class="n">' + rows.length + "</span></summary>" +
    '<div class="body"></div></details>');
  det.addEventListener("toggle", function () { state.openSections.__findings = det.open; });
  var wrap = el('<div class="table-wrap findings-table"></div>');
  var table = el("<table><thead><tr>" +
    "<th>#</th><th>Date</th><th>Auditor</th><th>Severity</th><th>What is wrong</th><th>Suggested fix</th><th>Why it matters</th><th>Status</th>" +
    "</tr></thead><tbody></tbody></table>");
  var tb = table.querySelector("tbody");
  rows.forEach(function (r) {
    tb.appendChild(el("<tr>" +
      '<td class="mono">' + esc(r.n) + "</td>" +
      "<td>" + esc(r.date || "—") + "</td>" +
      "<td>" + esc(r.auditor || "—") + "</td>" +
      "<td>" + findingSevPill(r.severity) + "</td>" +
      '<td class="prose">' + esc(r.wrong || r.title || "—") + "</td>" +
      '<td class="prose">' + esc(r.fix || "—") + "</td>" +
      '<td class="prose">' + esc(r.matters || "—") + "</td>" +
      "<td>" + esc(r.status || "—") + "</td>" +
    "</tr>"));
  });
  wrap.appendChild(table);
  det.querySelector(".body").appendChild(wrap);
  return det;
}

// A succinct gist shown below the PRD title. Prefers the authored frontmatter
// `summary`; falls back to the feature-title list so it is never blank.
function detailSummary(p) {
  if (p.summary) return esc(p.summary);
  var titles = (p.features || []).map(function (f) { return f.title; }).filter(Boolean);
  return titles.length ? "Delivers " + esc(titles.join("; ")) + "." : "";
}
function renderDetail(id) {
  var p = findPrd(id);
  root.innerHTML = "";
  if (!p) {
    root.appendChild(el('<div class="crumbs"><a class="back" href="#/">← Board</a></div>'));
    root.appendChild(el('<div class="empty-state"><div class="big">PRD not found</div>' + esc(id) + "</div>"));
    return;
  }

  root.appendChild(el('<div class="crumbs"><a class="back" href="#/">← Board</a><span>/</span><span>PRD-' +
    esc(p.num) + "</span></div>"));

  // G2a — status lives on the identity line; G2b — labelled created-date subtitle.
  var head = el('<div class="detail-head"></div>');
  var h2 = el('<h2><span class="num">PRD-' + esc(p.num) + "</span><span>" + esc(p.feature || p.id) + "</span></h2>");
  h2.appendChild(statusControl(p));
  head.appendChild(h2);
  var sum = detailSummary(p);   // 2–3 sentence gist of features + product objective, below the title
  if (sum) head.appendChild(el('<div class="detail-summary">' + sum + "</div>"));
  if (p.created) head.appendChild(el('<div class="subtitle">Created on: ' + esc(p.created) + "</div>"));
  head.appendChild(el('<div class="meta">' +
    (p.module ? '<span class="pill">' + esc(p.module) + "</span>" : "") +
    (p.platform ? '<span class="pill plat">' + esc(p.platform) + "</span>" : "") +
  "</div>"));
  head.appendChild(el('<div class="meta tuned-row">' + badgePills(p) + "</div>"));   // Edit 7 — tuned tags on their own row
  if (p.completionSource) head.appendChild(el('<div class="subtitle" style="margin-top:8px">Status inferred from: ' +
    esc(p.completionSource) + "</div>"));
  root.appendChild(head);

  // PRD details — split into per-section accordions (Edit 2/3), editable as a whole.
  var detailsHead = el('<div class="section-title">PRD details<span class="detail-actions"></span></div>');
  var sectionsHost = el('<div class="sections-host section"></div>');

  function renderSections() {
    state.editing = false;
    sectionsHost.innerHTML = "";
    var secs = splitSections(p.detail);
    if (!secs.length) {
      sectionsHost.appendChild(el('<div class="prose dim">(no PRD body captured)</div>'));
    } else {
      secs.forEach(function (s) {
        var open = state.openSections[s.slug] != null ? state.openSections[s.slug] : s.defaultOpen;
        var d = el('<details class="collapsible section"' + (open ? " open" : "") + ">" +
          '<summary><span class="chev">▸</span> ' + esc(s.heading) + "</summary>" +
          '<div class="body"><div class="prose md">' + mdToHtml(s.body) + "</div></div></details>");
        d.addEventListener("toggle", function () { state.openSections[s.slug] = d.open; });
        sectionsHost.appendChild(d);
      });
    }
    var findings = findingsAccordion(p);   // Edit 4 — plan-tune findings table (own accordion)
    if (findings) sectionsHost.appendChild(findings);
  }
  function showEditor() {
    state.editing = true;
    sectionsHost.innerHTML = "";
    var ta = el('<textarea class="editor" spellcheck="false"></textarea>');
    ta.value = p.detail || "";
    var bar = el('<div class="editbar"></div>');
    var save = el('<button class="btn primary">Save</button>');
    var cancel = el('<button class="btn ghost">Cancel</button>');
    save.addEventListener("click", function () {
      save.disabled = true;
      api("prd/save", { path: p.path, body: ta.value })
        .then(function () { toast("Saved " + p.id); return refreshData(true); })
        .catch(function (e) { save.disabled = false; toast("Save failed: " + e.message, true); });
    });
    cancel.addEventListener("click", renderSections);
    bar.appendChild(save); bar.appendChild(cancel);
    bar.appendChild(el('<span class="hint">writes the body back to ' + esc(p.path) + "</span>"));
    sectionsHost.appendChild(ta); sectionsHost.appendChild(bar);
  }
  if (LIVE) {
    var ask = el('<button class="btn ghost">✳ Ask Claude about this PRD</button>');   // Edit 5
    ask.addEventListener("click", function () {
      state.draft = "About PRD-" + p.num + " (" + p.path + "): ";
      location.hash = "#/prompts";
    });
    var edit = el('<button class="btn ghost">✎ Edit</button>');
    edit.addEventListener("click", function (e) { e.preventDefault(); showEditor(); });
    detailsHead.querySelector(".detail-actions").appendChild(ask);
    detailsHead.querySelector(".detail-actions").appendChild(edit);
  }
  root.appendChild(detailsHead);
  renderSections();
  root.appendChild(sectionsHost);

  // Todos + cross-linked issues
  var todos = allTodos(p);
  var xIssues = crossLinkedIssues(p);
  var combined = todos.concat(xIssues);
  root.appendChild(el('<div class="section-title">Todos' + (xIssues.length ? " &amp; issues" : "") + "</div>"));
  if (combined.length === 0) {
    root.appendChild(el('<div class="empty-state">No todos for this PRD. ' +
      '<span class="prose dim">(Run <code>eng --plan</code> — it writes the todo tickets in the same pass as the engineering section.)</span></div>'));
    return;
  }

  var toolbar = el('<div class="toolbar"></div>');
  toolbar.appendChild(seg("todoView", function () { renderDetail(id); }, [["kanban", "Kanban"], ["table", "Table"]]));
  if (LIVE) {
    var ask = el('<button class="btn ghost">✳ Ask Claude about these todos</button>');
    ask.addEventListener("click", function () {
      state.draft = "In " + p.path + " — question about the todos: ";
      location.hash = "#/prompts";
    });
    toolbar.appendChild(ask);
  }
  root.appendChild(toolbar);
  root.appendChild(state.todoView === "kanban" ? todoKanban(p, combined) : todoTable(p, combined));
}

/* ========================================================================= */
/*  TEST-ISSUE DETAIL PAGE                                                    */
/* ========================================================================= */
function renderIssueDetail(runId) {
  var tf = findIssueFile(runId);
  root.innerHTML = "";
  if (!tf) {
    root.appendChild(el('<div class="crumbs"><a class="back" href="#/">← Board</a></div>'));
    root.appendChild(el('<div class="empty-state"><div class="big">Gate issue not found</div>gate-' + esc(runId) + "</div>"));
    return;
  }

  root.appendChild(el('<div class="crumbs"><a class="back" href="#/">← Board</a><span>/</span><span>🐞 gate-' +
    esc(tf.runId) + "</span></div>"));

  var ctx = tf.context || {};
  var s = tf.summary || {};
  var counts = [];
  if (s.failed)   counts.push(s.failed + " failed");
  if (s.flaky)    counts.push(s.flaky + " flaky");
  if (s.warnings) counts.push(s.warnings + " warning" + (s.warnings === 1 ? "" : "s"));

  var head = el('<div class="detail-head"></div>');
  var h2 = el('<h2><span class="num">gate-' + esc(tf.runId) + "</span><span>Gate issues</span></h2>");
  h2.appendChild(el(issueVerdictPill(tf.verdict)));
  head.appendChild(h2);
  head.appendChild(el('<div class="meta">' +
    followPill(issueFollowStatus(tf)) +
    (counts.length ? '<span class="pill muted">' + esc(counts.join(" · ")) + "</span>" : "") +
    (ctx.branch ? '<span class="pill plat">' + esc(ctx.branch) + "</span>" : "") +
    (ctx.base ? '<span class="pill">base: ' + esc(ctx.base) + "</span>" : "") +
  "</div>"));
  head.appendChild(el(ctx.prd
    ? '<div class="subtitle" style="margin-top:8px">PRD: ' + esc(ctx.prd) +
      (findPrdByCtx(ctx.prd) ? ' — also shown on <a class="xlink" href="#/prd/' + esc(findPrdByCtx(ctx.prd).id) + '">PRD-' + esc(findPrdByCtx(ctx.prd).num) + "</a>" : "") + "</div>"
    : '<div class="subtitle" style="margin-top:8px">No PRD (ad hoc branch run)</div>'));
  head.appendChild(el('<div class="subtitle">Fix: <code>/eng --build gate-json=' + esc(tf.file) + "</code></div>"));
  root.appendChild(head);

  root.appendChild(el('<div class="section-title">Issues</div>'));
  var tickets = (tf.tickets || []).map(function (t) {
    return Object.assign({ _feature: "run " + tf.runId, _issueFile: tf, done: ticketDone(tf) }, t);
  });
  if (!tickets.length) {
    root.appendChild(el('<div class="empty-state">This ticket file has no issues.</div>'));
    return;
  }
  var toolbar = el('<div class="toolbar"></div>');
  toolbar.appendChild(seg("todoView", function () { renderIssueDetail(runId); }, [["kanban", "Kanban"], ["table", "Table"]]));
  if (LIVE) {
    var fix = el('<button class="btn ghost">🔧 Fix with Claude</button>');
    fix.addEventListener("click", function () {
      state.draft = "/eng --build gate-json=" + tf.file;
      location.hash = "#/prompts";
    });
    toolbar.appendChild(fix);
  }
  root.appendChild(toolbar);
  root.appendChild(state.todoView === "kanban" ? todoKanban(tf, tickets) : todoTable(tf, tickets));
}

function findPrdByCtx(prdPath) {
  if (!prdPath) return null;
  return PRDS.filter(function (p) {
    return String(prdPath).indexOf(p.id) >= 0 || (p.path && String(prdPath).indexOf(p.path) >= 0);
  })[0] || null;
}

/* ---- Todo buckets / tickets ---------------------------------------------------- */
var TODO_BUCKETS = [ { key: false, label: "Open", cls: "open" }, { key: true, label: "Done", cls: "done" } ];

function ticketFiles(t) {
  if (Array.isArray(t.files) && t.files.length) {
    return t.files.map(function (f) { return f.path + (f.action ? " (" + f.action + ")" : ""); });
  }
  if (t.file) return [t.file + (t.action ? " (" + t.action + ")" : "")];
  return [];
}
function ticketHeading(t) {
  var id = t.id || t._fid || "";
  var title = t.title || t.action || "todo";
  return (id ? id + " · " : "") + title;
}
function isIssue(t) { return t && t.kind === "issue"; }
// Toggleable = a real todo (not an issue — their done-state belongs to eng --build)
// on a PRD we know the path of, with a ticket id the server can find.
function canToggle(owner, t) { return LIVE && !isIssue(t) && owner && owner.path && t.id; }
function toggleTodo(owner, t, done) {
  api("todo/toggle", { prd: owner.path, id: t.id, done: !!done })
    .then(function () { toast(t.id + (done ? " done" : " reopened")); return refreshData(true); })
    .catch(function (e) { toast("Toggle failed: " + e.message, true); return refreshData(true); });
}
function sevPill(t) {
  if (!isIssue(t) || !t.severity) return "";
  return '<span class="pill sev-' + esc(t.severity) + '">' + esc(t.severity) + "</span>";
}
// Originating gate step, parsed from the finding's `source` (e.g. pre-merge:mechanical → "mechanical",
// pre-merge:bucket:e2e → "bucket:e2e"). After dedup `source` may be comma-joined — show the first.
function srcBadge(t) {
  if (!isIssue(t) || !t.source) return "";
  var step = String(t.source).split(",")[0].trim().replace(/^pre-merge:/, "");
  if (!step) return "";
  return '<span class="pill muted">' + esc(step) + "</span>";
}
function kindTag(t) {
  if (!isIssue(t)) return "";
  return '<span class="pill kind-issue">🐞 ' + (t.flaky ? "Flaky" : "Bug") + "</span>";
}

function todoCard(owner, t) {
  var files = ticketFiles(t);
  var c = el(
    '<div class="card todo-card' + (isIssue(t) ? " issue-card" : "") + (t.done ? " is-done" : "") + '" tabindex="0" role="button">' +
      '<div class="title"><span class="title-text">' + esc(ticketHeading(t)) + "</span>" +
        (t._feature ? ' <span class="prose dim">' + esc(t._feature) + "</span>" : "") + "</div>" +
      (t.objective ? '<div class="prose dim">' + esc(t.objective) + "</div>" : "") +
      '<div class="path">' + esc(files.length ? files.join(", ") : "(no files)") + "</div>" +
      '<div class="meta">' +
        kindTag(t) +
        sevPill(t) +
        srcBadge(t) +
        (t.type ? '<span class="pill type-' + esc(t.type) + '">' + esc(t.type) + "</span>" : "") +
        (t.priority ? '<span class="pill prio-' + esc(t.priority) + '">' + esc(t.priority) + "</span>" : "") +
        ((t.dependsOn && t.dependsOn.length) ? '<span class="pill muted">⛓ ' + esc(t.dependsOn.join(", ")) + "</span>" : "") +
      "</div>" +
    "</div>"
  );
  if (canToggle(owner, t)) {
    var check = el('<input type="checkbox" class="todo-check" aria-label="Mark done"' + (t.done ? " checked" : "") + ">");
    check.addEventListener("click", function (e) { e.stopPropagation(); });
    check.addEventListener("change", function () { toggleTodo(owner, t, check.checked); });
    c.querySelector(".title").insertBefore(check, c.querySelector(".title-text"));
    c.setAttribute("draggable", "true");
    c.addEventListener("dragstart", function (e) {
      e.dataTransfer.setData("text/msg-todo", String(t.id));
      e.dataTransfer.effectAllowed = "move";
      c.classList.add("dragging");
    });
    c.addEventListener("dragend", function () { c.classList.remove("dragging"); });
  }
  function open() { openPanel(t, owner); }
  c.addEventListener("click", open);
  c.addEventListener("keydown", function (e) { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); open(); } });
  return c;
}

function todoKanban(owner, todos) {
  var wrap = el('<div class="kanban"></div>');
  TODO_BUCKETS.forEach(function (bk) {
    var inCol = todos.filter(function (t) { return (t.done === true) === bk.key; });
    var col = el('<div class="column col-' + bk.cls + '"></div>');
    col.appendChild(el('<div class="column-head">' + esc(bk.label) + ' <span class="n">' + inCol.length + "</span></div>"));
    var cb = el('<div class="column-body' + (inCol.length ? "" : " empty") + '"></div>');
    inCol.forEach(function (t) { cb.appendChild(todoCard(owner, t)); });
    col.appendChild(cb);
    if (LIVE && owner && owner.path) makeDropTarget(col, function (tid) {
      var t = todos.filter(function (x) { return String(x.id) === String(tid); })[0];
      if (t && (t.done === true) !== bk.key && canToggle(owner, t)) toggleTodo(owner, t, bk.key);
    }, "text/msg-todo");
    wrap.appendChild(col);
  });
  return wrap;
}

function todoTable(owner, todos) {
  var sorted = todos.slice().sort(function (a, b) { return (a.done === true ? 1 : 0) - (b.done === true ? 1 : 0); });
  var wrap = el('<div class="table-wrap compact"></div>');
  var table = el("<table><thead><tr>" +
    (LIVE ? "<th></th>" : "") +
    "<th>Ticket</th><th>Objective</th><th>Type</th><th>Priority</th><th>Files</th><th>Depends on</th><th>Status</th>" +
    "</tr></thead></table>");
  var tbody = el("<tbody></tbody>");
  sorted.forEach(function (t) {
    var files = ticketFiles(t);
    var row = el("<tr>" +
      (LIVE ? '<td class="check-cell"></td>' : "") +
      "<td>" + esc((t.id || t._fid || "") + (t.title ? " · " + t.title : "")) + "</td>" +
      '<td class="prose">' + esc(t.objective || "") + "</td>" +
      "<td>" + (t.type ? '<span class="pill type-' + esc(t.type) + '">' + esc(t.type) + "</span>" : "") + "</td>" +
      "<td>" + (t.priority ? '<span class="pill prio-' + esc(t.priority) + '">' + esc(t.priority) + "</span>" : "") + "</td>" +
      '<td class="mono">' + esc(files.join(", ")) + "</td>" +
      '<td class="mono">' + esc((t.dependsOn && t.dependsOn.length) ? t.dependsOn.join(", ") : "—") + "</td>" +
      "<td>" + (t.done ? '<span class="pill st-done">Done</span>' : '<span class="pill st-open">Open</span>') + "</td>" +
    "</tr>");
    if (LIVE && canToggle(owner, t)) {
      var check = el('<input type="checkbox" class="todo-check" aria-label="Mark done"' + (t.done ? " checked" : "") + ">");
      check.addEventListener("click", function (e) { e.stopPropagation(); });
      check.addEventListener("change", function () { toggleTodo(owner, t, check.checked); });
      row.querySelector(".check-cell").appendChild(check);
    }
    rowify(row, function () { openPanel(t, owner); });                                   // G6
    tbody.appendChild(row);
  });
  table.appendChild(tbody);
  wrap.appendChild(table);
  return wrap;
}

/* ---- Side panel ------------------------------------------------------------------ */
function field(label, value, mono) {
  if (value == null || value === "") return "";
  return '<div class="field"><div class="label">' + esc(label) + "</div>" +
         '<div class="val' + (mono ? " mono" : "") + '">' + esc(value) + "</div></div>";
}
// Edit 6 — like field(), but the value is trusted HTML (e.g. a rendered pill).
function fieldHtml(label, html) {
  if (html == null || html === "") return "";
  return '<div class="field"><div class="label">' + esc(label) + "</div>" +
         '<div class="val">' + html + "</div></div>";
}
function typePill(t) {
  return t.type ? '<span class="pill type-' + esc(t.type) + '">' + esc(t.type) + "</span>" : "";
}
function prioPill(t) {
  return t.priority ? '<span class="pill prio-' + esc(t.priority) + '">' + esc(t.priority) + "</span>" : "";
}
function openPanel(t, owner) {
  document.getElementById("panel-title").textContent = ticketHeading(t);
  var files = ticketFiles(t);
  var snippet = t.evidence && t.evidence.snippet;
  document.getElementById("panel-body").innerHTML =
    field(isIssue(t) ? "Gate run" : "Feature", t._feature) +
    field("Ticket", t.id) +
    (isIssue(t) ? field("Kind", t.flaky ? "🐞 Flaky gate issue" : "🐞 Bug / Gate issue") : "") +
    (isIssue(t) && t.source ? field("Gate step", String(t.source).replace(/^pre-merge:/, "")) : "") +
    field("Objective", t.objective) +
    fieldHtml("Type", typePill(t)) +              // Edit 6 — tag form, not text
    fieldHtml("Priority", prioPill(t)) +
    (isIssue(t) ? field("Severity", t.severity) : "") +
    (isIssue(t) ? field("Category", t.category) : "") +
    (isIssue(t) ? field("Rule", t.rule, true) : "") +
    field("Files", files.join("\n"), true) +
    field("Depends on", (t.dependsOn && t.dependsOn.length) ? t.dependsOn.join(", ") : "none") +
    field("Done when", t.doneWhen) +
    (isIssue(t) ? field("Repro", t.repro, true) : "") +
    (isIssue(t) ? field("Evidence", snippet, true) : "") +
    (isIssue(t) ? field("Suggestion", t.suggestion) : "") +
    field("Status", t.done ? (isIssue(t) ? "Resolved" : "Done") : "Open");

  var actions = document.getElementById("panel-actions");
  actions.innerHTML = "";
  if (LIVE) {
    var ask = el('<button class="btn">✳ Ask Claude about this</button>');
    ask.addEventListener("click", function () {
      closePanel();
      state.draft = isIssue(t)
        ? "About gate issue " + (t.id || "") + " in " + ((t._issueFile && t._issueFile.file) || "") +
          " (\"" + (t.title || "") + "\"): "
        : "About ticket " + (t.id || "") + " in " + ((owner && owner.path) || "") +
          " (\"" + (t.title || t.objective || "") + "\"): ";
      location.hash = "#/prompts";
    });
    actions.appendChild(ask);
    if (canToggle(owner, t)) {
      var tog = el('<button class="btn">' + (t.done ? "Reopen" : "Mark done") + "</button>");
      tog.addEventListener("click", function () { closePanel(); toggleTodo(owner, t, !t.done); });
      actions.appendChild(tog);
    }
    if (isIssue(t) && t._issueFile) {
      var fix = el('<button class="btn">🔧 Fix with Claude</button>');
      fix.addEventListener("click", function () {
        closePanel();
        state.draft = "/eng --build gate-json=" + t._issueFile.file;
        location.hash = "#/prompts";
      });
      actions.appendChild(fix);
    }
  }
  document.getElementById("panel").classList.add("open");
  document.getElementById("panel").setAttribute("aria-hidden", "false");
  document.getElementById("scrim").classList.add("open");
}
function closePanel() {
  document.getElementById("panel").classList.remove("open");
  document.getElementById("panel").setAttribute("aria-hidden", "true");
  document.getElementById("scrim").classList.remove("open");
}
document.getElementById("panel-close").addEventListener("click", closePanel);
document.getElementById("scrim").addEventListener("click", closePanel);
document.getElementById("modal-scrim").addEventListener("click", function () { if (modalCancel) modalCancel(); });
document.addEventListener("keydown", function (e) {
  if (e.key !== "Escape") return;
  if (modalCancel) modalCancel();   // modal takes precedence over the side panel
  else closePanel();
});

/* ========================================================================= */
/*  FILES PAGE — devkit / CLAUDE.md / README project docs                     */
/* ========================================================================= */
var filesCache = null;   // [{path, group}] (live) or [{path, group, content}] (static embed)
function loadFileList() {
  if (filesCache) return Promise.resolve(filesCache);
  if (LIVE) return api("files").then(function (j) { filesCache = j.files || []; return filesCache; });
  filesCache = DATA.projectFiles || [];
  return Promise.resolve(filesCache);
}
function loadFileContent(path) {
  if (LIVE) return api("file?path=" + encodeURIComponent(path)).then(function (j) { return j.content; });
  var f = (DATA.projectFiles || []).filter(function (x) { return x.path === path; })[0];
  return Promise.resolve(f ? f.content : null);
}
function renderFiles(sel) {
  root.innerHTML = "";
  root.appendChild(topbar("files", { title: "Project Files" }));
  var host = el("<div></div>");
  root.appendChild(host);
  loadFileList().then(function (files) {
    if (!files.length) {
      host.appendChild(el('<div class="empty-state"><div class="big">No project docs found</div>' +
        "Looked for README, CLAUDE.md and <code>devkit/</code> docs.</div>"));
      return;
    }
    if (!sel) sel = files[0].path;
    var layout = el('<div class="files-layout"></div>');
    var list = el('<div class="file-list"></div>');
    var groups = {};
    files.forEach(function (f) {
      var g = f.group || "Project";
      if (!groups[g]) { groups[g] = true; list.appendChild(el('<div class="file-group">' + esc(g) + "</div>")); }
      var item = el('<button class="file-item' + (f.path === sel ? " active" : "") + '">' +
        "📄 <span>" + esc(f.path.split("/").pop()) + "</span></button>");
      item.addEventListener("click", function () { location.hash = "#/files/" + encodeURIComponent(f.path); });
      list.appendChild(item);
    });
    var content = el('<div class="file-content"><div class="file-path">' + esc(sel) + "</div>" +
      '<div class="empty-state">Loading…</div></div>');
    layout.appendChild(list);
    layout.appendChild(content);
    host.appendChild(layout);
    loadFileContent(sel).then(function (text) {
      content.innerHTML = '<div class="file-path">' + esc(sel) + "</div>";
      if (text == null) { content.appendChild(el('<div class="empty-state">Could not read file.</div>')); return; }
      if (/\.md$/i.test(sel)) content.appendChild(el('<div class="prose md">' + mdToHtml(text) + "</div>"));
      else content.appendChild(el('<pre class="raw">' + esc(text) + "</pre>"));
    }).catch(function (e) {
      content.innerHTML = '<div class="file-path">' + esc(sel) + '</div><div class="empty-state">' + esc(e.message) + "</div>";
    });
  });
}

/* ========================================================================= */
/*  REPORTS PAGE — run reports written by eng --build / pre-merge / post-merge */
/*  (report-[n].md per shared/refs/report-schema.md)                          */
/* ========================================================================= */
function findReport(file) {
  return REPORTS.filter(function (r) { return r.file === file; })[0];
}
function reportVerdictPill(v) {
  if (!v || v === "n/a") return '<span class="pill muted">n/a</span>';
  var cls = v === "pass" ? "st-shipped" : (v === "fail" || v === "block") ? "dot iv-fail" : "dot iv-warn";
  return '<span class="pill ' + cls + '">' + esc(v) + "</span>";
}
function reportStatsFrag(r) {
  var s = r.stats || {}, bits = [];
  if (s.filesChanged != null) bits.push(s.filesChanged + " files");
  if (s.linesAdded != null || s.linesRemoved != null)
    bits.push("+" + (s.linesAdded || 0) + "/−" + (s.linesRemoved || 0));
  if (s.testsPassed != null || s.testsFailed != null)
    bits.push((s.testsPassed || 0) + " passed" + (s.testsFailed ? " · " + s.testsFailed + " failed" : ""));
  return bits.length ? '<span class="pill muted">' + esc(bits.join(" · ")) + "</span>" : "";
}
// H4 — a production post-merge report carries the literal token IRREVERSIBLE in
// its body when a no-rollback platform (iOS) ships; surface it prominently.
function reportIrreversible(r) { return /\bIRREVERSIBLE\b/.test(String(r && r.detail || "")); }
function irreversibleBadge() {
  return '<span class="pill irreversible" title="A shipped platform cannot be rolled back">⚠ IRREVERSIBLE</span>';
}
function reportCard(r) {
  var c = el(
    '<div class="card issue-file-card" tabindex="0" role="button">' +
      '<div class="title"><span class="num">' + esc(r.skill || "run") + " · report-" + esc(r.reportId) + "</span>" +
        esc(r.title || "") + "</div>" +
      '<div class="meta">' +
        reportVerdictPill(r.verdict) +
        (reportIrreversible(r) ? irreversibleBadge() : "") +
        reportStatsFrag(r) +
        (r.branch ? '<span class="pill muted">' + esc(r.branch) + "</span>" : "") +
        (r.generated ? '<span class="pill muted">' + esc(r.generated) + "</span>" : "") +
      "</div>" +
    "</div>"
  );
  function go() { location.hash = "#/reports/" + encodeURIComponent(r.file); }
  c.addEventListener("click", go);
  c.addEventListener("keydown", function (e) { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); go(); } });
  return c;
}
function renderReports() {
  root.innerHTML = "";
  root.appendChild(topbar("reports", { title: "Run Reports", count: REPORTS.length }));
  if (!REPORTS.length) {
    root.appendChild(el('<div class="empty-state"><div class="big">No reports yet</div>' +
      "<code>eng --build</code>, <code>/pre-merge</code> and <code>/post-merge</code> write " +
      "<code>report-[n].md</code> under <code>features/…/reports/</code> when a run completes.</div>"));
    return;
  }
  var groups = {}, order = [];
  REPORTS.forEach(function (r) {
    var k = r.prdId || "_none";
    if (!groups[k]) { groups[k] = []; order.push(k); }
    groups[k].push(r);
  });
  order.forEach(function (k) {
    var p = k === "_none" ? null : findPrd(k);
    var label = k === "_none" ? "No PRD" : (p ? p.feature + " · " + k : k);
    root.appendChild(el('<div class="section-title">' + esc(label) +
      ' <span class="n" style="color:var(--text-faint)">' + groups[k].length + "</span></div>"));
    var grid = el('<div class="issue-grid"></div>');
    groups[k].forEach(function (r) { grid.appendChild(reportCard(r)); });
    root.appendChild(grid);
  });
}
function renderReportDetail(file) {
  var r = findReport(file);
  root.innerHTML = "";
  root.appendChild(topbar("reports", { title: r ? (r.title || file) : "Report" }));
  if (!r) {
    root.appendChild(el('<div class="empty-state"><div class="big">Report not found</div>' + esc(file) + "</div>"));
    return;
  }
  var head = el('<div class="meta" style="margin:8px 0 16px;display:flex;gap:8px;flex-wrap:wrap;align-items:center"></div>');
  head.appendChild(el(reportVerdictPill(r.verdict)));
  head.appendChild(el('<span class="pill muted">' + esc(r.skill || "run") + "</span>"));
  if (r.branch) head.appendChild(el('<span class="pill muted">' + esc(r.branch) + "</span>"));
  var stats = reportStatsFrag(r);
  if (stats) head.appendChild(el(stats));
  if (r.generated) head.appendChild(el('<span class="pill muted">' + esc(r.generated) + "</span>"));
  var p = r.prdId ? findPrd(r.prdId) : null;
  if (p) head.appendChild(el('<a class="pill muted" href="#/prd/' + encodeURIComponent(p.id) + '">↗ ' + esc(p.feature) + "</a>"));
  root.appendChild(head);
  // H4 — release-style: a prominent callout when a production report ships a
  // no-rollback (IRREVERSIBLE) platform.
  if (reportIrreversible(r)) {
    root.appendChild(el('<div class="callout-irreversible">⚠ <strong>IRREVERSIBLE release</strong> — a shipped platform ' +
      '(e.g. iOS) cannot be rolled back once live. Review the rollback notes below before relying on this.</div>'));
  }
  root.appendChild(el('<div class="prose md">' + mdToHtml(r.detail || "") + "</div>"));
  root.appendChild(el('<div class="file-path" style="margin-top:16px">' + esc(r.file) + "</div>"));
}

/* ========================================================================= */
/*  PROMPTS PAGE — run Claude prompts against the project (live only)         */
/* ========================================================================= */
var jobsTimer = null;
var seenJobDone = {};
var QUICK_PROMPTS = [
  ["Generate a PRD", "/plan-pm "],
  ["Write eng plan + todos", "/eng --plan "],
  ["Tune a PRD", "/plan-tune "],
  ["Ask about the project", "Looking at this project's PRDs and docs: "]
];
function renderPrompts() {
  root.innerHTML = "";
  root.appendChild(topbar("prompts", { title: "Prompts" }));
  if (!LIVE) {
    root.appendChild(el('<div class="empty-state"><div class="big">Prompts need live mode</div>' +
      "Serve the board with <code>server.py</code> to run prompts from here.</div>"));
    return;
  }

  var box = el('<div class="console-box"></div>');
  var ta = el('<textarea placeholder="Ask Claude anything about this project — or run a skill, e.g. /plan-pm a booking flow…"></textarea>');
  ta.value = state.draft || "";
  state.draft = "";
  var actions = el('<div class="console-actions"></div>');
  QUICK_PROMPTS.forEach(function (q) {
    var chip = el('<button class="chip">' + esc(q[0]) + "</button>");
    chip.addEventListener("click", function () { ta.value = q[1]; ta.focus(); });
    actions.appendChild(chip);
  });
  var run = el('<button class="btn primary run">Run ▸</button>');
  function submit() {
    var prompt = ta.value.trim();
    if (!prompt) return;
    run.disabled = true;
    api("prompt", { prompt: prompt })
      .then(function () { ta.value = ""; run.disabled = false; toast("Prompt started"); pollJobs(); })
      .catch(function (e) { run.disabled = false; toast("Failed to start: " + e.message, true); });
  }
  run.addEventListener("click", submit);
  ta.addEventListener("keydown", function (e) {
    if ((e.metaKey || e.ctrlKey) && e.key === "Enter") { e.preventDefault(); submit(); }
  });
  actions.appendChild(run);
  box.appendChild(ta);
  box.appendChild(actions);
  root.appendChild(box);

  root.appendChild(el('<div class="section-title">Runs</div>'));
  var jobsHost = el('<div id="jobs"></div>');
  root.appendChild(jobsHost);
  pollJobs();
  ta.focus();
}
function jobFrag(j) {
  var wrap = el('<div class="job"></div>');
  var head = el('<div class="job-head">' +
    '<span class="pill job-status ' + esc(j.status) + '">' + esc(j.status) + "</span>" +
    '<span class="prompt-text">' + esc(j.prompt) + "</span>" +
    '<span class="pill muted">' + (j.elapsed != null ? Math.round(j.elapsed) + "s" : "") + "</span>" +
  "</div>");
  var out = el('<pre class="job-out' + (j.status === "running" ? "" : " hidden") + '">' +
    esc(j.output || "(no output yet)") + "</pre>");
  head.addEventListener("click", function () { out.classList.toggle("hidden"); });
  wrap.appendChild(head);
  wrap.appendChild(out);
  return wrap;
}
function pollJobs() {
  clearTimeout(jobsTimer);
  var host = document.getElementById("jobs");
  if (!host) return;
  api("jobs").then(function (j) {
    var jobs = j.jobs || [];
    host.innerHTML = "";
    if (!jobs.length) host.appendChild(el('<div class="empty-state">No runs yet.</div>'));
    jobs.forEach(function (job) {
      host.appendChild(jobFrag(job));
      if (job.status !== "running" && !seenJobDone[job.id]) {
        seenJobDone[job.id] = true;
        if (job.justFinished) {                       // only toast fresh completions
          toast(job.status === "done" ? "Prompt finished" : "Prompt failed", job.status !== "done");
          refreshData(false);                         // board reflects any new/edited PRDs
        }
      }
    });
    var running = jobs.some(function (x) { return x.status === "running"; });
    if (running && location.hash === "#/prompts") jobsTimer = setTimeout(pollJobs, 1500);
  }).catch(function () { /* transient — next visit re-polls */ });
}

/* ---- Segmented control --------------------------------------------------------- */
function seg(stateKey, rerender, opts) {
  var s = el('<div class="seg"></div>');
  opts.forEach(function (o) {
    var b = el("<button" + (state[stateKey] === o[0] ? ' class="active"' : "") + ">" + esc(o[1]) + "</button>");
    b.addEventListener("click", function () { state[stateKey] = o[0]; rerender(); });
    s.appendChild(b);
  });
  return s;
}

/* ---- Router ---------------------------------------------------------------------- */
function route() {
  closePanel();
  if (DATA.project) document.title = DATA.project + " — PRDs";
  var h = location.hash || "#/";
  var m;
  if ((m = h.match(/^#\/prd\/(.+)$/))) renderDetail(decodeURIComponent(m[1]));
  else if ((m = h.match(/^#\/issues\/(.+)$/))) renderIssueDetail(decodeURIComponent(m[1]));
  else if ((m = h.match(/^#\/reports\/(.+)$/))) renderReportDetail(decodeURIComponent(m[1]));
  else if (h === "#/reports") renderReports();
  else if ((m = h.match(/^#\/files\/(.+)$/))) renderFiles(decodeURIComponent(m[1]));
  else if (h === "#/files") renderFiles(null);
  else if (h === "#/prompts") renderPrompts();
  else if (h === "#/roadmap") renderRoadmap();
  else renderList();
}
window.addEventListener("hashchange", route);

/* ---- Boot: detect live mode, then render ------------------------------------------ */
// Honour --view: open on the Roadmap tab when asked and no explicit hash was given.
if ((!location.hash || location.hash === "#/" || location.hash === "#") &&
    DEFAULT_VIEW === "roadmap" && ROADMAP && (ROADMAP.exists || LIVE)) {
  location.hash = "#/roadmap";
}
route();                                              // paint immediately from inline data
if (typeof fetch === "function") fetch("api/ping", { headers: { "X-Msg-Token": TOKEN } })
  .then(function (r) { return r.ok ? r.json() : null; })
  .then(function (j) {
    if (j && j.ok) {
      LIVE = true;
      (j.jobs || []).forEach(function (id) { seenJobDone[id] = true; });  // don't toast stale jobs
      return api("data").then(function (d) { adoptData(d); route(); });
    }
  })
  .catch(function () { /* static mode — inline data already rendered */ });
</script>
</body>
