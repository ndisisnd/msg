<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PRD Board — msg</title>
<!--
  msg --gui  ·  static, read-only PRD board.
  Generated by .claude/skills/msg/refs/protocol-gui.md via template + data-fill.
  Two placeholders are replaced at generation time (each appears exactly once below):
    the STYLES token inside <style>          ← contents of refs/gui/styles.css
    the PRD-DATA token inside the JSON script ← a JSON object (see protocol-gui.md)
  This app is GET-only: no fetch, no POST, no writes. All data is inline below.
-->
<style>__STYLES__</style>
</head>
<body>

<div id="root" class="app"></div>

<div id="scrim" class="scrim"></div>
<aside id="panel" class="panel" aria-hidden="true">
  <div class="panel-head">
    <h3 id="panel-title">Todo</h3>
    <button class="panel-close" id="panel-close" aria-label="Close">×</button>
  </div>
  <div class="panel-body" id="panel-body"></div>
</aside>

<script id="prd-data" type="application/json">__PRD_DATA__</script>
<script>
"use strict";

/* ---- Load inline data ---------------------------------------------------- */
var DATA = { prds: [], skipped: [] };
try { DATA = JSON.parse(document.getElementById("prd-data").textContent) || DATA; }
catch (e) { DATA = { prds: [], skipped: [], _parseError: String(e) }; }
var PRDS = Array.isArray(DATA.prds) ? DATA.prds : [];

/* ---- Completion buckets (criterion 17, 19) ------------------------------- */
var BUCKETS = [
  { key: "product",  label: "Product" },
  { key: "eng",      label: "Engineering" },
  { key: "building", label: "Building" },
  { key: "review",   label: "Review" },
  { key: "shipped",  label: "Shipped" }
];
var BUCKET_ORDER = BUCKETS.reduce(function (m, b, i) { m[b.key] = i; return m; }, {});
function bucketOf(p) { return BUCKET_ORDER[p.completion] != null ? p.completion : "eng"; }
function bucketLabel(k) { var b = BUCKETS.filter(function (x) { return x.key === k; })[0]; return b ? b.label : k; }

/* ---- Helpers ------------------------------------------------------------- */
function esc(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}
function el(html) { var t = document.createElement("template"); t.innerHTML = html.trim(); return t.content.firstChild; }
function findPrd(id) { return PRDS.filter(function (p) { return String(p.id) === String(id); })[0]; }
function todoCounts(p) {
  var all = (p.features || []).reduce(function (a, f) { return a.concat(f.todos || []); }, []);
  var done = all.filter(function (t) { return t && t.done === true; }).length;
  return { done: done, total: all.length };
}
function allTodos(p) {
  return (p.features || []).reduce(function (a, f) {
    return a.concat((f.todos || []).map(function (t) { return Object.assign({ _fid: f.id, _feature: f.title }, t); }));
  }, []);
}

/* ---- Reusable fragments -------------------------------------------------- */
function statusPill(p) {
  var k = bucketOf(p);
  return '<span class="pill dot st-' + k + '">' + esc(bucketLabel(k)) + '</span>';
}
function badgePills(p) {
  var b = p.badges || {};
  function one(label, v) {
    if (v == null) return '<span class="pill unset">' + esc(label) + ' —</span>';
    return '<span class="pill ' + (v ? 'set' : 'unset') + '">' + esc(label) + (v ? ' ✓' : ' ✕') + '</span>';
  }
  return one("product-tuned", b.productTuned) + one("eng-tuned", b.engTuned) + one("reviewed", b.reviewed);
}
function progressFrag(p) {
  if (!p.hasTodos) return "";                    // edge case 3 — no fraction, no 0/0
  var c = todoCounts(p);
  if (c.total === 0) return "";
  var pct = c.total ? Math.round((c.done / c.total) * 100) : 0;
  return '<span class="progress"><span class="bar"><i style="width:' + pct + '%"></i></span>' +
         c.done + '/' + c.total + '</span>';
}

/* ---- View state ---------------------------------------------------------- */
var state = {
  listView: "kanban",     // kanban | table
  todoView: "kanban",     // kanban | table (per detail)
  filter: "",
  sortKey: "completion",
  sortDir: 1
};

var root = document.getElementById("root");

/* ========================================================================= */
/*  LIST PAGE                                                                 */
/* ========================================================================= */
function renderList() {
  root.innerHTML = "";

  root.appendChild(el(
    '<div class="topbar"><h1>PRD Board</h1>' +
    '<span class="count">' + PRDS.length + ' PRD' + (PRDS.length === 1 ? '' : 's') +
    (DATA.skipped && DATA.skipped.length ? ' · ' + DATA.skipped.length + ' skipped' : '') +
    '</span></div>'
  ));

  if (DATA.skipped && DATA.skipped.length) {
    root.appendChild(el('<div class="notice">' + DATA.skipped.length +
      ' PRD file(s) skipped (unparseable): ' +
      esc(DATA.skipped.map(function (s) { return s.path; }).join(", ")) + '</div>'));
  }

  if (PRDS.length === 0) {                        // edge case 1 — empty board
    root.appendChild(el('<div class="empty-state"><div class="big">No PRDs yet</div>' +
      'Nothing under <code>features/prd-*/</code>. Run <code>/plan-pm</code> to create one.</div>'));
    return;
  }

  var toolbar = el('<div class="toolbar"></div>');
  toolbar.appendChild(seg("listView", renderList, [["kanban", "Kanban"], ["table", "Table"]]));
  var f = el('<input class="filter-input" type="text" placeholder="Filter PRDs…">');
  f.value = state.filter;
  f.addEventListener("input", function () { state.filter = f.value; renderListBody(body); });
  toolbar.appendChild(f);
  root.appendChild(toolbar);

  var body = el('<div id="list-body"></div>');
  root.appendChild(body);
  renderListBody(body);
}

function visiblePrds() {
  var q = state.filter.trim().toLowerCase();
  var list = PRDS.filter(function (p) {
    if (!q) return true;
    return [p.feature, p.module, p.platform, p.id, "prd-" + p.num].join(" ").toLowerCase().indexOf(q) >= 0;
  });
  return list;
}

function renderListBody(body) {
  body.innerHTML = "";
  var list = visiblePrds();
  if (list.length === 0) { body.appendChild(el('<div class="empty-state">No PRDs match “' + esc(state.filter) + '”.</div>')); return; }
  body.appendChild(state.listView === "kanban" ? listKanban(list) : listTable(list));
}

function prdCard(p) {
  var c = el(
    '<div class="card" tabindex="0">' +
      '<div class="title"><span class="num">PRD-' + esc(p.num) + '</span>' + esc(p.feature || p.id) + '</div>' +
      '<div class="meta">' +
        statusPill(p) +
        (p.module ? '<span class="pill">' + esc(p.module) + '</span>' : '') +
        (p.platform ? '<span class="pill plat">' + esc(p.platform) + '</span>' : '') +
        progressFrag(p) +
      '</div>' +
    '</div>'
  );
  function go() { location.hash = "#/prd/" + encodeURIComponent(p.id); }
  c.addEventListener("click", go);
  c.addEventListener("keydown", function (e) { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); go(); } });
  return c;
}

function listKanban(list) {
  var wrap = el('<div class="kanban"></div>');
  BUCKETS.forEach(function (bk) {
    var inCol = list.filter(function (p) { return bucketOf(p) === bk.key; });
    var col = el('<div class="column"></div>');
    col.appendChild(el('<div class="column-head">' + esc(bk.label) +
      ' <span class="n">' + inCol.length + '</span></div>'));
    var cb = el('<div class="column-body' + (inCol.length ? '' : ' empty') + '"></div>');
    inCol.forEach(function (p) { cb.appendChild(prdCard(p)); });
    col.appendChild(cb);
    wrap.appendChild(col);
  });
  return wrap;
}

function listTable(list) {
  var cols = [
    { key: "num",        label: "PRD",        get: function (p) { return p.num; } },
    { key: "feature",    label: "Feature",    get: function (p) { return p.feature || p.id; } },
    { key: "module",     label: "Module",     get: function (p) { return p.module || ""; } },
    { key: "platform",   label: "Platform",   get: function (p) { return p.platform || ""; } },
    { key: "completion", label: "Status",     get: function (p) { return BUCKET_ORDER[bucketOf(p)]; } },
    { key: "todos",      label: "Todos",      get: function (p) { var c = todoCounts(p); return p.hasTodos ? c.done / (c.total || 1) : -1; } }
  ];
  var sorted = list.slice().sort(function (a, b) {
    var col = cols.filter(function (c) { return c.key === state.sortKey; })[0] || cols[4];
    var va = col.get(a), vb = col.get(b);
    if (typeof va === "string") { va = va.toLowerCase(); vb = String(vb).toLowerCase(); }
    return (va < vb ? -1 : va > vb ? 1 : 0) * state.sortDir;
  });

  var wrap = el('<div class="table-wrap"></div>');
  var table = el('<table></table>');
  var thead = el('<thead><tr></tr></thead>');
  var tr = thead.querySelector("tr");
  cols.forEach(function (col) {
    var arrow = state.sortKey === col.key ? '<span class="arrow">' + (state.sortDir > 0 ? "▲" : "▼") + '</span>' : "";
    var th = el('<th>' + esc(col.label) + arrow + '</th>');
    th.addEventListener("click", function () {
      if (state.sortKey === col.key) state.sortDir *= -1; else { state.sortKey = col.key; state.sortDir = 1; }
      renderListBody(document.getElementById("list-body"));
    });
    tr.appendChild(th);
  });
  table.appendChild(thead);

  var tbody = el('<tbody></tbody>');
  sorted.forEach(function (p) {
    var row = el('<tr>' +
      '<td class="mono">PRD-' + esc(p.num) + '</td>' +
      '<td>' + esc(p.feature || p.id) + '</td>' +
      '<td>' + (p.module ? '<span class="pill">' + esc(p.module) + '</span>' : '') + '</td>' +
      '<td>' + (p.platform ? '<span class="pill plat">' + esc(p.platform) + '</span>' : '') + '</td>' +
      '<td>' + statusPill(p) + '</td>' +
      '<td>' + (progressFrag(p) || '<span class="pill muted">—</span>') + '</td>' +
    '</tr>');
    row.addEventListener("click", function () { location.hash = "#/prd/" + encodeURIComponent(p.id); });
    tbody.appendChild(row);
  });
  table.appendChild(tbody);
  wrap.appendChild(table);
  return wrap;
}

/* ========================================================================= */
/*  DETAIL PAGE                                                               */
/* ========================================================================= */
function renderDetail(id) {
  var p = findPrd(id);
  root.innerHTML = "";
  if (!p) {
    root.appendChild(el('<div class="crumbs"><a class="back" href="#/">← Board</a></div>'));
    root.appendChild(el('<div class="empty-state"><div class="big">PRD not found</div>' + esc(id) + '</div>'));
    return;
  }

  var crumbs = el('<div class="crumbs"><a class="back" href="#/">← Board</a><span>/</span><span>PRD-' +
    esc(p.num) + '</span></div>');
  root.appendChild(crumbs);

  root.appendChild(el(
    '<div class="detail-head">' +
      '<h2><span class="num" style="color:var(--text-faint);font-weight:500;margin-right:8px">PRD-' + esc(p.num) + '</span>' +
        esc(p.feature || p.id) + '</h2>' +
      '<div class="meta">' + statusPill(p) +
        (p.module ? '<span class="pill">' + esc(p.module) + '</span>' : '') +
        (p.platform ? '<span class="pill plat">' + esc(p.platform) + '</span>' : '') +
        (p.created ? '<span class="pill muted">' + esc(p.created) + '</span>' : '') +
        badgePills(p) +
      '</div>' +
      (p.completionSource ? '<div class="prose dim" style="margin-top:10px;font-size:var(--fs-sm)">Status inferred from: ' + esc(p.completionSource) + '</div>' : '') +
    '</div>'
  ));

  // Collapsible full PRD details (criterion 20) — open by default
  var det = el(
    '<details class="collapsible section" open>' +
      '<summary><span class="chev">▸</span> PRD details</summary>' +
      '<div class="body"><div class="prose">' + esc(p.detail || "(no PRD body captured)") + '</div></div>' +
    '</details>'
  );
  root.appendChild(det);

  // TODO section (criterion 21-23)
  root.appendChild(el('<div class="section-title">Todos</div>'));
  var todos = allTodos(p);
  if (!p.hasTodos || todos.length === 0) {         // edge case 3 / no F2 output yet
    root.appendChild(el('<div class="empty-state">No todos for this PRD. ' +
      '<span class="prose dim">(Run <code>plan-em</code> with the todo layer enabled to generate them.)</span></div>'));
    return;
  }

  var toolbar = el('<div class="toolbar"></div>');
  toolbar.appendChild(seg("todoView", function () { renderDetail(id); }, [["kanban", "Kanban"], ["table", "Table"]]));
  root.appendChild(toolbar);
  root.appendChild(state.todoView === "kanban" ? todoKanban(p, todos) : todoTable(p, todos));
}

/* TODO completion buckets — with no stored done-state, all render as Open (edge case 5) */
var TODO_BUCKETS = [ { key: false, label: "Open" }, { key: true, label: "Done" } ];

function todoCard(t) {
  var c = el(
    '<div class="card todo-card" tabindex="0">' +
      '<div class="title">' + esc(t.action ? t.action + " · " : "") + esc(t._fid || "") +
        (t._feature ? ' <span class="prose dim">' + esc(t._feature) + '</span>' : '') + '</div>' +
      '<div class="path">' + esc(t.file || "(no file)") + '</div>' +
      '<div class="meta">' +
        (t.type ? '<span class="pill type-' + esc(t.type) + '">' + esc(t.type) + '</span>' : '') +
        (t.action ? '<span class="pill">' + esc(t.action) + '</span>' : '') +
      '</div>' +
    '</div>'
  );
  function open() { openPanel(t); }
  c.addEventListener("click", open);
  c.addEventListener("keydown", function (e) { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); open(); } });
  return c;
}

function todoKanban(p, todos) {
  var wrap = el('<div class="kanban"></div>');
  TODO_BUCKETS.forEach(function (bk) {
    var inCol = todos.filter(function (t) { return (t.done === true) === bk.key; });
    var col = el('<div class="column"></div>');
    col.appendChild(el('<div class="column-head">' + esc(bk.label) + ' <span class="n">' + inCol.length + '</span></div>'));
    var cb = el('<div class="column-body' + (inCol.length ? '' : ' empty') + '"></div>');
    inCol.forEach(function (t) { cb.appendChild(todoCard(t)); });
    col.appendChild(cb);
    wrap.appendChild(col);
  });
  return wrap;
}

function todoTable(p, todos) {
  // sorted by completion status (criterion 21): open first, then done
  var sorted = todos.slice().sort(function (a, b) { return (a.done === true ? 1 : 0) - (b.done === true ? 1 : 0); });
  var wrap = el('<div class="table-wrap compact"></div>');
  var table = el('<table><thead><tr>' +
    '<th>Feature</th><th>Type</th><th>Action</th><th>File</th><th>Status</th>' +
    '</tr></thead></table>');
  var tbody = el('<tbody></tbody>');
  sorted.forEach(function (t) {
    var row = el('<tr>' +
      '<td>' + esc(t._fid || "") + '</td>' +
      '<td>' + (t.type ? '<span class="pill type-' + esc(t.type) + '">' + esc(t.type) + '</span>' : '') + '</td>' +
      '<td class="action-' + esc(t.action || "") + '">' + esc(t.action || "") + '</td>' +
      '<td class="mono">' + esc(t.file || "") + '</td>' +
      '<td>' + (t.done ? '<span class="pill st-shipped">Done</span>' : '<span class="pill muted">Open</span>') + '</td>' +
    '</tr>');
    row.addEventListener("click", function () { openPanel(t); });
    tbody.appendChild(row);
  });
  table.appendChild(tbody);
  wrap.appendChild(table);
  return wrap;
}

/* ---- Side panel (criterion 23) ------------------------------------------ */
function field(label, value, mono) {
  if (value == null || value === "") return "";
  return '<div class="field"><div class="label">' + esc(label) + '</div>' +
         '<div class="val' + (mono ? ' mono' : '') + '">' + esc(value) + '</div></div>';
}
function openPanel(t) {
  document.getElementById("panel-title").textContent = (t._fid ? t._fid + " · " : "") + (t.action || "todo");
  document.getElementById("panel-body").innerHTML =
    field("Feature", t._feature) +
    field("Type", t.type) +
    field("Action", t.action) +
    field("File", t.file, true) +
    field("Done when", t.doneWhen) +
    field("Status", t.done ? "Done" : "Open");
  document.getElementById("panel").classList.add("open");
  document.getElementById("panel").setAttribute("aria-hidden", "false");
  document.getElementById("scrim").classList.add("open");
}
function closePanel() {
  document.getElementById("panel").classList.remove("open");
  document.getElementById("panel").setAttribute("aria-hidden", "true");
  document.getElementById("scrim").classList.remove("open");
}
document.getElementById("panel-close").addEventListener("click", closePanel);
document.getElementById("scrim").addEventListener("click", closePanel);
document.addEventListener("keydown", function (e) { if (e.key === "Escape") closePanel(); });

/* ---- Segmented control --------------------------------------------------- */
function seg(stateKey, rerender, opts) {
  var s = el('<div class="seg"></div>');
  opts.forEach(function (o) {
    var b = el('<button' + (state[stateKey] === o[0] ? ' class="active"' : '') + '>' + esc(o[1]) + '</button>');
    b.addEventListener("click", function () { state[stateKey] = o[0]; rerender(); });
    s.appendChild(b);
  });
  return s;
}

/* ---- Router (GET-only, hash-based) --------------------------------------- */
function route() {
  closePanel();
  var h = location.hash || "#/";
  var m = h.match(/^#\/prd\/(.+)$/);
  if (m) renderDetail(decodeURIComponent(m[1]));
  else renderList();
}
window.addEventListener("hashchange", route);
route();
</script>
</body>
</html>
